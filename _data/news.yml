- date: 2026-08-17
  type: "Appointment"
  title: "Joined Syracuse University as Assistant Professor"  
  description: >
    I am excited to share that I will be joining Syracuse University this fall as an Assistant Professor in the School of Education! 
  
    I am incredibly grateful for everyone who has supported and encouraged me throughout this journey. This new chapter is both exciting and humbling, and I look forward to the opportunities ahead, learning from wonderful colleagues and students, contributing through teaching and research, and becoming part of the Syracuse community 😊  
    
- date: 2026-04-23  
  type: "Workshops"  
  title: "AI & ML in the U.S. Counselor Education: Building Literacy for Classroom and Research"  
  description: "Workshop hosted by the Korean Counseling Association International Chapter (KCA-IC) focusing on artificial intelligence and machine learning literacy in counselor education, including applications for classroom teaching and research."
  image: /images/news/20260423_kcaic_ai_ml_workshop.png  

- date: 2026-04-21    
  type: "Workshops"  
  title: "Treating Trauma Using Eye Movement Desensitization and Reprocessing (EMDR)"  
  description: "Professional development workshop focused on trauma treatment using Eye Movement Desensitization and Reprocessing (EMDR) for mental health counseling students and faculty at The University of Texas at El Paso and Universidad Autónoma de Ciudad Juárez in Ciudad Juárez. The workshop introduced participants to the fundamentals of trauma and provided an overview of EMDR as a specialized trauma treatment modality."  
  image: /images/news/20260421_emdr_workshop_uacj.png  

